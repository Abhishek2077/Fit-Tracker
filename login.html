<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - FitTracker</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
  <script>
    const savedTheme = localStorage.getItem('ft_theme');
    if (savedTheme) {
      document.documentElement.setAttribute('data-theme', savedTheme);
    }
  </script>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-container">
      <div class="login-header">
        <div class="logo">💪</div>
        <h1>FitTracker</h1>
        <p class="text-sm text-muted">Your offline, multi-user fitness companion.</p>
      </div>

      <div class="login-tabs">
        <div class="login-tab active" onclick="switchLoginTab('login')">Login</div>
        <div class="login-tab" onclick="switchLoginTab('register')">Create Profile</div>
      </div>

      <!-- Login Form -->
      <div id="form-login" class="login-form active">
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="login-username" class="neu-input" placeholder="e.g. johndoe" autocomplete="off" spellcheck="false" required style="width:100%">
        </div>
        <div class="input-group">
          <label>4-Digit PIN (Optional)</label>
          <input type="password" id="login-pin" class="neu-input" placeholder="****" inputmode="numeric" maxlength="4" style="width:100%">
        </div>
        <button class="btn btn-primary" onclick="login()" style="width:100%;margin-top:10px">Sign In</button>
      </div>

      <!-- Register Form -->
      <div id="form-register" class="login-form">
        <div class="input-group">
          <label>Choose Username</label>
          <input type="text" id="reg-username" class="neu-input" placeholder="e.g. johndoe" autocomplete="off" spellcheck="false" required style="width:100%">
        </div>
        <div class="input-group">
          <label>Set 4-Digit PIN (Optional)</label>
          <input type="password" id="reg-pin" class="neu-input" placeholder="****" inputmode="numeric" maxlength="4" style="width:100%">
        </div>
        <button class="btn btn-primary" onclick="register()" style="width:100%;margin-top:10px">Create Profile</button>
        <p class="text-xs text-muted" style="margin-top:16px;text-align:center">Data is stored entirely offline on this device. Your data is perfectly safe and private.</p>
      </div>
      
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="js/login.js"></script>
</body>
</html>
