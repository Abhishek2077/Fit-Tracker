<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <title>AI Coach - FitTracker AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>
  <header class="page-header">
    <div>
      <h1 class="heading-lg">🤖 AI Coach</h1>
      <p class="text-xs text-muted">Powered by Google Gemini</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="clearChat()" id="btn-clear-chat">🗑️ Clear</button>
    </div>
  </header>

  <main class="page-content">
    <div class="chat-container">
      <!-- Quick Prompts -->
      <div class="quick-prompts">
        <button class="quick-prompt" onclick="quickPrompt('What should I eat today for muscle gain?')">🍗 Meal suggestion</button>
        <button class="quick-prompt" onclick="quickPrompt('Analyze my progress this week')">📊 Weekly analysis</button>
        <button class="quick-prompt" onclick="quickPrompt('I ate KFC today, how bad is it?')">🍔 Cheat meal impact</button>
        <button class="quick-prompt" onclick="quickPrompt('Give me a push day workout')">💪 Workout plan</button>
        <button class="quick-prompt" onclick="quickPrompt('How much protein do I need?')">🥩 Protein advice</button>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chat-messages"></div>

      <!-- Input -->
      <div class="chat-input-area">
        <button class="btn btn-icon btn-secondary" onclick="startChatVoice()" style="width:46px;height:46px;flex-shrink:0" id="btn-voice-chat">🎙️</button>
        <textarea class="chat-input" id="chat-input" placeholder="Ask your AI coach..." rows="1"></textarea>
        <button class="chat-send" onclick="sendMessage()" id="btn-send">➤</button>
      </div>
    </div>
  </main>

  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
