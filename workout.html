<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <title>Workout - FitTracker AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/workout.css">
</head>
<body>
  <header class="page-header">
    <h1 class="heading-lg">🏋️ Workout</h1>
    <a href="dashboard.html" class="btn btn-ghost btn-sm">← Back</a>
  </header>

  <main class="page-content">
    <!-- Quick Add -->
    <div class="workout-form" data-animate>
      <h3 class="heading-md" style="margin-bottom:12px">Add Exercise</h3>
      <div class="exercise-chips">
        <button class="chip" onclick="addExercise('Bench Press')">Bench Press</button>
        <button class="chip" onclick="addExercise('Squat')">Squat</button>
        <button class="chip" onclick="addExercise('Deadlift')">Deadlift</button>
        <button class="chip" onclick="addExercise('OHP')">OHP</button>
        <button class="chip" onclick="addExercise('Barbell Row')">Row</button>
        <button class="chip" onclick="addExercise('Lat Pulldown')">Lat Pull</button>
        <button class="chip" onclick="addExercise('Bicep Curl')">Curls</button>
        <button class="chip" onclick="addExercise('Leg Press')">Leg Press</button>
      </div>
      <div style="display:flex;gap:8px">
        <input type="text" class="neu-input" id="exercise-name-input" placeholder="Or type exercise name...">
        <button class="btn btn-primary" onclick="addExercise()" id="btn-add-exercise">Add</button>
      </div>
    </div>

    <!-- Current Exercise List -->
    <div id="exercises-list" data-animate>
      <p class="text-sm text-muted" style="text-align:center;padding:20px">Add exercises above to start</p>
    </div>

    <!-- Save Button -->
    <button class="btn btn-primary btn-lg" onclick="saveWorkout()" style="width:100%;margin-bottom:24px" id="btn-save-workout">
      💾 Save Workout
    </button>

    <!-- PRs -->
    <section class="pr-section" data-animate>
      <h3 class="heading-md" style="margin-bottom:12px">🏆 Personal Records</h3>
      <div id="pr-list"></div>
    </section>

    <!-- History -->
    <section data-animate>
      <h3 class="heading-md" style="margin-bottom:12px">📋 Recent Workouts</h3>
      <div id="workout-history"></div>
    </section>
  </main>

  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
  <script src="js/workout.js"></script>
</body>
</html>
